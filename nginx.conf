server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets statiques servis directement
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /safemode/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /safemode/index.html;
    }

    location /safemode {
        return 301 /safemode/;
    }

    # SPA fallback — tout le reste renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}